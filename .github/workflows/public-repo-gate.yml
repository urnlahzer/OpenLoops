name: Public repository gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check committed files and history
        shell: pwsh
        run: ./tools/check-public-repo.ps1 -Mode History
